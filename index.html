body {

.container {

}

/* ===== テーブル ===== */
table {
  border-collapse: collapse;
  width: 300px;
}

th, td {
  border-bottom: 1px solid #d9d9d9;
  padding: 10px;
}

.song-title {
  cursor: pointer;

.song-title:hover {

/* ===== 詳細 ===== */
.detail {

.song-title.playing {

  font-weight: bold;
}
.song-title.playing::before {
  content: "▶ ";
  color: #52a5e4;
}

.song-title.disabled {

  cursor: default;
  pointer-events: none;
  font-style: italic;

.singer {

.carousel {

  position: relative;
  backdrop-filter: blur(6px);
    position: sticky;
    top: 0;
    z-index: 10;

    background: #fff; /* 下が透けないように */

    display: flex;
    justify-content: center;

}



/* 表示窓 */
.carousel-viewport {
  width: 80%;
  max-width: 240px;
  overflow: hidden;

  mask-image: linear-gradient(
    to right,
    transparent 0%,
    black 15%,
    black 85%,
    transparent 100%
  );
}

/* 横並び */
.carousel-track {
  display: flex;
  gap: 32px;
  transition: transform 0.6s ease;
}

/* アルバム画像 */
.album {
  width: 70px;
  flex-shrink: 0;
  opacity: 0.4;
  transform: scale(0.9);
  transition: opacity 0.6s, transform 0.6s;
  cursor: pointer;
}

/* 中央アクティブ */
.album.active {
  opacity: 1;
  transform: scale(1);
}

/* ナビボタン */
.nav {
  background: none;
  border: none;
  font-size: 48px;
  color: #aaa;
  cursor: pointer;
}
.nav:hover {

.page {

.play-indicator {
  width: 24px;
  height: 43px;
  vertical-align: middle;

body {
  position: relative;
  overflow-x: hidden;
}

.carousel-track {
  transition: transform 0.6s ease-out;
}

.equalizer {
  display: inline-flex;
  align-items: flex-end;
  gap: 3px;
  height: 20px;
  vertical-align: middle;
}


.equalizer span {
  width: 5px;
  height: 20px;
  background: #52a5e4;
  border-radius: 2px;
  animation: bounce 1s infinite ease-in-out;
  animation-play-state: paused;
}



/* バラバラに動かす */
.equalizer span:nth-child(1) { animation-delay: 0s; }
.equalizer span:nth-child(2) { animation-delay: 0.2s; }
.equalizer span:nth-child(3) { animation-delay: 0.4s; }
.equalizer span:nth-child(4) { animation-delay: 0.1s; }

@keyframes bounce {
  0%, 100% { height: 6px; }
  50% { height: 18px; }
}

/* 再生中 */
.equalizer.playing span {
  animation-play-state: running;
}

});


function selectSong(i, clickedTd) {
  const s = songs[i];

  // ===== 表示更新 =====
  document.getElementById("title").textContent = s.title;
  document.getElementById("composer").textContent = s.composer;
  document.getElementById("singer").textContent = s.singer;
  document.getElementById("lyrics").textContent = s.lyrics;
  document.getElementById("jacket").src = s.jacket;
  document.getElementById("lyrics").scrollTop = 0;

  // ===== 再生 =====
  audio.src = s.audio;
  audio.currentTime = 0;
  audio.play();

  // ===== ハイライト制御 =====
  document.querySelectorAll(".song-title").forEach(td => {
    td.classList.remove("playing");
  });
  clickedTd.classList.add("playing");

  currentIndex = i;
}

songs.forEach((song, i) => {
  const tr = document.createElement("tr");
  const td = document.createElement("td");

  td.textContent = song.title;
  td.className = "song-title";
  td.onclick = () => selectSong(i, td);

  tr.appendChild(td);
  list.appendChild(tr);
});

const track = document.querySelector('.carousel-track');
let albums = Array.from(document.querySelectorAll('.album'));
const prev = document.querySelector('.nav.left');
const next = document.querySelector('.nav.right');
const viewport = document.querySelector('.carousel-viewport');


track.addEventListener("transitionend", () => {
  if (index === 0) {
    track.style.transition = "none";
    index = albums.length - 2;
    update(false);
  }

  track.addEventListener("transitionend", () => {
  if (index < visibleCount) {
    track.style.transition = "none";
    index += originals.length;
    update(false);
  }

  if (index >= originals.length + visibleCount) {
    track.style.transition = "none";
    index -= originals.length;
    update(false);
  }
});
});

const visibleCount = 3; // 中央＋左右分

let index = visibleCount;


const originals = Array.from(document.querySelectorAll('.album'));

// 前後に複数コピー
for (let i = 0; i < visibleCount; i++) {
  const first = originals[i].cloneNode(true);
  const last = originals[originals.length - 1 - i].cloneNode(true);

  track.appendChild(first);
  track.insertBefore(last, track.firstChild);
}

albums = Array.from(document.querySelectorAll('.album'));

function update(animate = true) {
  const albumWidth = albums[0].offsetWidth + 32;
  const offset =
    -(albumWidth * index)
    + viewport.offsetWidth / 2
    - albumWidth / 2;

  track.style.transition = animate ? 'transform 0.6s ease' : 'none';
  track.style.transform = `translateX(${offset}px)`;

  albums.forEach(a => a.classList.remove("active"));

  const activeAlbum = albums[index];
  if (!activeAlbum) return;

  activeAlbum.classList.add("active");

  const albumId = activeAlbum.dataset.album;
  if (albumId) {
    renderPlaylist(albumId);
  }
}


/* ===== 移動 ===== */
next.onclick = () => {
  index++;
  update(true);
};

prev.onclick = () => {
  index--;
  update(true);
};

window.addEventListener('load', () => update(false));
window.addEventListener('resize', () => update(false));


function renderPlaylist(albumId) {
  list.innerHTML = "";

  const filtered = songs.filter(s => s.album === albumId);

  filtered.forEach(song => {
    const tr = document.createElement("tr");
    const td = document.createElement("td");

    td.textContent = song.title;

    if (song.clickable === false) {
      td.className = "song-title disabled";
    } else {
      td.className = "song-title";
      td.onclick = () => selectSong(
        songs.indexOf(song),
        td
      );
    }

    tr.appendChild(td);
    list.appendChild(tr);
  });
}

track.addEventListener("click", (e) => {
  const albumEl = e.target.closest(".album");
  if (!albumEl) return;

  const i = albums.indexOf(albumEl);

  if (i === -1) return;

  if (i === 0) {
    index = albums.length - visibleCount - 1;
  } 
  else if (i === albums.length - 1) {
    index = visibleCount;
  } 
  else {
    index = i;
  }

  update(true);
});


</script>

</div>
</body>
</html>
